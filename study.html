<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Nuton Cave</title>
  <meta name="description" content="Readings of grumpy mythical Belgian creature">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital@0;1&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/cave-icon" href="img/cave.png">
</head>

<body>

  <!--
    SCRIPT D'INITIALISATION DU DARK MODE — placé tôt dans le <body>
    On lit localStorage avant que la page s'affiche,
    ce qui évite un "flash" de thème clair au chargement.
  -->
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>
<div class="wrapper">
  <nav>
    <div class="nav-left">
      <a id="index-nav" href="index.html" class="nav-logo">
        <span class="nav-highlight"></span> 
        The Cave
      </a>
      <a id="projects-nav" href="projects.html" class="nav-logo"> 
        <span class="nav-highlight"></span>
        Projects 
      </a>
      <a id="reading-nav" href="study.html" class="nav-logo active"> 
        Reading 
        <span class="nav-highlight"></span>
      </a> 
      <a id="listening-nav" href="listeningRoom.html" class="nav-logo">
        Listening
        <span class="nav-highlight"></span>
      </a>
      <a id="blog-nav" href="thoughts.html" class="nav-logo">
        Thoughts
        <span class="nav-highlight"></span>
      </a>

    </div>
    <ul id= "navigation-links" class="nav-links">
      <li><a href="about.html">About the Nuton</a></li>
      <li><a href="https://github.com/ghubin" target="_blank" rel="noopener noreferrer">Github</a></li>
      <li>
        <!--
          BOUTON DARK MODE
          aria-label = texte pour les lecteurs d'écran (accessibilité)
          L'icône changera via JavaScript selon le thème actif
        -->
        <button id="dark-toggle" aria-label="Basculer le mode nuit">🌙</button>
      </li>
    </ul>
  </nav>

  <footer>
    <p>© 2026 - The Nuton Cave - Built with curiosity (not the rover) and mischievousness</p>
  </footer>

  <!--
    SCRIPT DU DARK MODE — placé en bas du <body>
    Raison : le DOM (les éléments HTML) doit être chargé
    avant qu'on puisse y accéder avec getElementById.
    Placer les scripts à la fin est une bonne pratique.
  -->
  <script>
    const btn = document.getElementById('dark-toggle');
    // getElementById cherche l'élément avec id="dark-toggle"

    // Fonction qui met à jour l'icône selon le thème actif
    function updateIcon() {
      // body.classList.contains('dark') renvoie true ou false
      btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
      // Si dark → afficher le soleil (pour repasser au clair)
      // Sinon → afficher la lune (pour passer au sombre)
    }

    updateIcon(); // appel immédiat pour afficher la bonne icône au chargement

    btn.addEventListener('click', function () {
      // addEventListener écoute les clics sur le bouton
      // À chaque clic, on bascule la classe "dark" sur le <body>
      document.body.classList.toggle('dark');
      // toggle = ajoute la classe si absente, la retire si présente

      // On sauvegarde le choix dans localStorage
      // localStorage = stockage persistant dans le navigateur (survit à la fermeture)
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');

      updateIcon(); // met à jour l'icône après le changement
    });
  </script>
  
  <script>
    window.addEventListener('scroll', () => {
      const item = document.getElementById('navigation-links');
      if(!item) return;
      
      const currentScroll = window.scrollY;
      const scrollThreshold = 75;

      if(currentScroll >= scrollThreshold){
        item.style.opacity = '0';
        item.style.visibility='none';
        item.style.pointerEvents = 'none';
      }
      else{
        item.style.opacity = 1-(currentScroll/scrollThreshold);
        item.style.visibility = 'visible';
        item.style.pointerEvents = 'auto';
      }
    });
  </script>

</div>
</body>
</html>
